name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Install the package (core deps: numpy/pillow/pydicom) plus pytest. The data-free
      # tests exercise the metrics/codebook/routing — no heavy readers or GPU needed.
      - name: Install package
        run: pip install -e . pytest

      - name: Run tests
        run: pytest tests/ -q
